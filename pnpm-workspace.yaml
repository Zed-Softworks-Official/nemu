packages:
  - "apps/*"
  - "packages/*"
  - "tooling/*"

allowBuilds:
  bufferutil: true
  core-js: true
  esbuild: true
  sharp: true
  utf-8-validate: true

catalog:
  zod: ^3.25.76
  react: ^19.0.0
  react-dom: ^19.0.0
  "@types/react": ^19.0.10
  "@types/react-dom": ^19.0.10
  "@types/node": ^22.13.10
  typescript: ^5.9.2
  next: ^16.2.10
  "@clerk/nextjs": ^7.5.18
  "@clerk/ui": ^1.25.2
  convex: ^1.42.3
  axios: ^1.18.1

overrides:
  zod@4: 4.3.6
  convex: "catalog:"

minimumReleaseAgeExclude:
  - convex@1.42.3
